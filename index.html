<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market-ting-ting | Ôn tập Marketing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { overflow-x: hidden; }
        body.mindmap-active { overflow: hidden; }
        .canvas-container {
            width: 100vw; height: calc(100vh - 4rem);
            overflow: auto; -webkit-overflow-scrolling: touch;
            position: relative;
        }
        .mindmap-wrapper { display: flex; flex-direction: column; align-items: center; padding: 100px; min-width: max-content; }
        .node {
            padding: 1rem 1.5rem; border-radius: 1rem; color: white; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.3s;
            text-align: center; min-width: 180px; position: relative; z-index: 10;
        }
        .node:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300">

    <nav class="fixed top-0 left-0 right-0 h-16 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b dark:border-slate-700 z-40 px-4 flex items-center justify-between">
        <h1 class="text-lg font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">Market-ting-ting</h1>
        <div class="flex bg-slate-100 dark:bg-slate-700 p-1 rounded-lg">
            <button id="tab-mindmap" onclick="switchTab('mindmap')" class="px-4 py-1.5 text-sm font-semibold rounded-md bg-white dark:bg-slate-800 shadow text-blue-600">Sơ đồ</button>
            <button id="tab-quiz" onclick="switchTab('quiz')" class="px-4 py-1.5 text-sm font-semibold rounded-md text-slate-500">Trắc nghiệm</button>
        </div>
    </nav>

    <main class="pt-16">
        <div id="mindmapTab" class="canvas-container">
            <div id="canvas" class="w-full h-full overflow-auto">
                <div class="mindmap-wrapper" id="mindmap">
                    <div class="node bg-indigo-600 mb-20 text-xl" onclick="openDetail(1)">Chương 1: Tổng quan</div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-20">
                         <div class="node bg-blue-500" onclick="openDetail(2)">Chương 2</div>
                         <div class="node bg-blue-500" onclick="openDetail(3)">Chương 3</div>
                         <div class="node bg-blue-500" onclick="openDetail(4)">Chương 4</div>
                         <div class="node bg-emerald-500" onclick="openDetail(5)">Chương 5</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="quizTab" class="hidden max-w-4xl mx-auto p-4 py-8">
            <div id="quizMenu" class="space-y-6">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-3xl text-white shadow-lg">
                    <h2 class="text-2xl font-bold mb-2">Luyện Tập Trắc Nghiệm</h2>
                    <p class="opacity-80">Hệ thống câu hỏi bám sát giáo trình Marketing Căn bản.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="showChapterSelection()" class="p-6 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 hover:border-blue-500 transition text-left">
                        <i class="fa-solid fa-book text-blue-500 text-2xl mb-3"></i>
                        <div class="font-bold">Ôn tập theo chương</div>
                    </button>
                    <button onclick="startMockExam()" class="p-6 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 hover:border-blue-500 transition text-left">
                        <i class="fa-solid fa-vial-circle-check text-indigo-500 text-2xl mb-3"></i>
                        <div class="font-bold">Thi thử tổng hợp</div>
                    </button>
                </div>
                <button onclick="openHistory()" class="w-full bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 p-4 rounded-2xl font-bold transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left"></i> Xem lịch sử điểm
                </button>
            </div>

            <div id="chapterSelection" class="hidden animate-fade-in">
                <button onclick="backToMenu()" class="mb-6 text-blue-600 flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Quay lại</button>
                <div id="chapterButtonsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>

            <div id="quizExecution" class="hidden">
                <div id="quizHeader" class="mb-8">
                    <h2 id="quizTitle" class="text-2xl font-bold text-slate-800 dark:text-white"></h2>
                    <p id="quizSubtitle" class="text-slate-500"></p>
                </div>
                <div id="questionsContainer" class="space-y-6 mb-20"></div>
                <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-t dark:border-slate-700">
                    <div class="max-w-4xl mx-auto flex items-center justify-between">
                        <div id="resultSummary" class="hidden font-bold"></div>
                        <button id="submitBtn" onclick="submitQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition">Nộp bài</button>
                        <button id="retryBtn" onclick="retryCurrentQuiz()" class="hidden bg-slate-600 hover:bg-slate-700 text-white px-8 py-3 rounded-xl font-bold transition">Làm lại bài này</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="backdrop" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-50 hidden transition-opacity duration-300 opacity-0" onclick="closeDetail()"></div>
    <div id="detailPanel" class="fixed top-0 right-0 h-full w-full max-w-md bg-white dark:bg-slate-800 z-50 shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div id="panelHeader" class="p-6 border-b dark:border-slate-700 flex justify-between items-center text-white bg-indigo-600">
            <div>
                <p id="detailChapter" class="text-xs opacity-80 font-bold uppercase tracking-wider"></p>
                <h2 id="detailTitle" class="text-xl font-bold leading-tight"></h2>
            </div>
            <button onclick="closeDetail()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <div id="detailContent" class="p-8 overflow-y-auto flex-1 custom-scrollbar"></div>
    </div>

    <div id="historyModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl border dark:border-slate-700 rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[85vh] transform transition-all">
            <div class="p-5 border-b dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/30">
                <h2 class="text-xl font-bold dark:text-white flex items-center gap-2"><i class="fa-solid fa-chart-line text-blue-500"></i> Lịch sử làm bài</h2>
                <button onclick="closeHistory()" class="text-slate-500 hover:text-red-500"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-5 overflow-y-auto flex-1" id="historyContent"></div>
            <div class="p-4 border-t dark:border-slate-800 flex justify-end">
                <button onclick="clearHistory()" class="px-5 py-2 text-sm text-red-600 bg-red-50 dark:bg-red-900/20 rounded-lg font-semibold"><i class="fa-solid fa-trash-can mr-2"></i>Xóa lịch sử</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
