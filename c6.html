<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương 6: Chiến Lược Sản Phẩm</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Font Be Vietnam Pro & Lora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --font-sans-vn: 'Be Vietnam Pro', system-ui, -apple-system, sans-serif; 
            --font-serif-vn: 'Lora', Georgia, serif; 
        }
        body { font-family: var(--font-sans-vn); background-color: #F4F6F8; color: #333D4B; -webkit-font-smoothing: antialiased;}
        .font-sans { font-family: var(--font-sans-vn) !important; }
        .font-serif { font-family: var(--font-serif-vn) !important; }
        .golden-keyword {
            background: linear-gradient(120deg, #FDE047 0%, #FEF08A 100%);
            color: #713F12;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, createContext, useContext } = React;

        // --- TỪ ĐIỂN THUẬT NGỮ (GLOSSARY DATA) ---
        const dictionaryData = {
            "Chiến lược STP": "STP viết tắt của: Segmentation (Phân khúc thị trường), Targeting (Lựa chọn thị trường mục tiêu), và Positioning (Định vị thương hiệu). Xác định bán cho ai và họ nhớ gì về bạn.",
            "Marketing Mix 4P": "Tổ hợp 4 công cụ marketing cơ bản: Sản phẩm (Product), Giá (Price), Phân phối (Place) và Xúc tiến (Promotion).",
            "Người bán hàng im lặng": "Khái niệm chỉ Bao bì sản phẩm. Dù không biết nói, bao bì thiết kế tốt có thể tự quảng bá, thu hút và thuyết phục khách hàng mua ngay tại kệ hàng.",
            "Hữu hình": "Những sản phẩm vật chất, có thể cầm, nắm, sờ, chạm vào được (cái điện thoại, đôi giày).",
            "Phi vật chất": "Dịch vụ. Không thể cầm nắm hay cất trữ, chỉ có thể cảm nhận.",
            "Đường biểu diễn doanh số hình quả chuông": "Đường đồ thị doanh thu bắt đầu thấp, đi lên điểm cao nhất ở giữa (như hình cái chuông), rồi từ từ đi xuống."
        };

        const GlossaryContext = createContext();

        // --- HELPER COMPONENTS ---

        const Term = ({ term, children, variant = "default" }) => {
            const { setActiveTerm, activeTerm } = useContext(GlossaryContext);
            const isActive = activeTerm === term;
            
            // Kiểu hiển thị Pill (Cho Roadmap)
            if (variant === "pill") {
                return (
                    <span 
                        onClick={(e) => { e.stopPropagation(); setActiveTerm(term); }}
                        className={`inline-block font-bold px-3 py-1 mx-1 my-1 rounded-md cursor-pointer transition-all duration-200 shadow-sm border 
                            ${isActive ? 'bg-blue-700 text-white border-blue-800' : 'bg-[#E0F2FE] text-[#1E3A8A] border-[#BAE6FD] hover:bg-blue-600 hover:text-white hover:border-blue-700'}`}
                    >
                        {children || term}
                    </span>
                );
            }

            // Kiểu hiển thị mặc định
            return (
                <span 
                    onClick={(e) => { e.stopPropagation(); setActiveTerm(term); }}
                    className={`inline-block font-semibold px-2 py-0.5 mx-1 rounded-md cursor-pointer transition-all duration-200 border-b-[3px] 
                        ${isActive ? 'bg-blue-600 text-white border-blue-800' : 'bg-blue-50 text-blue-800 border-blue-200 hover:bg-blue-600 hover:text-white hover:border-blue-800'}`}
                >
                    {children || term}
                </span>
            );
        };

        const ExamTip = ({ title, children }) => (
            <div className="my-6 bg-[#FEF2F2] p-5 rounded-xl border border-[#FECACA] shadow-sm border-l-4 border-l-[#DC2626]">
                <h4 className="font-bold text-[#991B1B] text-[1rem] uppercase tracking-wider mb-2 flex items-center gap-2 font-sans">
                    <i className="fa-solid fa-triangle-exclamation text-[#DC2626]"></i> {title || "BẪY TRẮC NGHIỆM KINH ĐIỂN"}
                </h4>
                <div className="text-[0.95rem] text-[#7F1D1D] leading-relaxed font-sans">
                    {children}
                </div>
            </div>
        );

        const DeepDiveCard = ({ icon, title, summary, details, example, colorTheme }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className={`p-6 rounded-2xl border-l-4 shadow-sm bg-white font-sans ${colorTheme} transition-all duration-300 flex flex-col h-full hover:shadow-md`}>
                    <div className="flex items-center gap-4 mb-4">
                        <div className="p-3 rounded-lg bg-opacity-20 bg-current text-current">
                            <i className={`${icon}`} style={{ fontSize: '28px' }}></i>
                        </div>
                        <h3 className="font-bold text-xl text-slate-900">{title}</h3>
                    </div>
                    <div className="text-base text-slate-700 font-serif leading-relaxed mb-6 flex-grow">{summary}</div>
                    
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="flex items-center justify-between w-full p-3 bg-slate-50 hover:bg-slate-100 rounded-lg transition-colors font-bold text-slate-700 text-sm border border-slate-200 mt-auto group"
                    >
                        <span className="flex items-center gap-2">
                            <i className="fa-solid fa-lightbulb text-amber-500 group-hover:animate-pulse"></i>
                            {isOpen ? "Thu gọn phân tích" : "Xem phân tích chuyên sâu"}
                        </span>
                        <i className={`fa-solid ${isOpen ? 'fa-chevron-up' : 'fa-chevron-down'}`}></i>
                    </button>

                    {isOpen && (
                        <div className="mt-5 pt-5 border-t border-slate-200 animate-in fade-in duration-300 space-y-5">
                            <div>
                                <h4 className="font-bold text-sm text-slate-900 uppercase tracking-wider mb-2 opacity-80">Chi Tiết</h4>
                                <div className="text-base text-slate-800 font-serif leading-relaxed">{details}</div>
                            </div>
                            {example && (
                                <div className="bg-[#F0FDFA] p-4 rounded-xl border border-[#CCFBF1]">
                                    <h4 className="font-bold text-sm text-[#0D9488] uppercase tracking-wider mb-2 flex items-center gap-2">
                                        <i className="fa-solid fa-bookmark"></i> Ví dụ thực tiễn
                                    </h4>
                                    <p className="text-base text-[#115E59] font-serif leading-relaxed italic">{example}</p>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const ScaleCard = ({ title, summary, example, icon, borderColor, bgColor, iconColor }) => (
            <div className="bg-white border border-slate-200 rounded-xl p-5 md:p-6 flex flex-col md:flex-row items-start gap-4 md:gap-5 relative overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                <div className={`absolute left-0 top-0 bottom-0 w-2 ${borderColor}`}></div>
                <div className={`w-14 h-14 rounded-xl flex items-center justify-center shrink-0 ${bgColor} ${iconColor}`}>
                    <i className={`${icon}`} style={{ fontSize: '28px' }}></i>
                </div>
                <div className="flex-1">
                    <h4 className="font-bold text-slate-900 text-[1.15rem] mb-2">{title}</h4>
                    <div className="text-slate-700 text-[0.95rem] mb-3 leading-relaxed font-sans">{summary}</div>
                    {example && (
                        <div className="text-[0.9rem] text-[#059669] bg-[#F0FDF4] px-3 py-2 rounded-lg italic flex items-start gap-2">
                            <i className="fa-solid fa-check mt-1"></i>
                            <span>{example}</span>
                        </div>
                    )}
                </div>
            </div>
        );

        // --- CÂY PLC TỪ CHƯƠNG 6 ---
        const PLCTreeVisualization = () => (
            <div className="my-10 bg-[#F8FAFC] p-8 md:p-12 rounded-2xl border border-slate-200 shadow-sm font-sans">
                <h4 className="text-center font-bold text-[#1E3A8A] mb-12 text-xl md:text-2xl flex items-center justify-center gap-3 uppercase tracking-wider">
                    <i className="fa-solid fa-seedling text-[#10B981] text-2xl"></i> Tưởng tượng Vòng Đời SP như một Cái Cây
                </h4>
                
                <div className="relative flex flex-col md:flex-row justify-between items-center gap-8 max-w-4xl mx-auto">
                    <div className="hidden md:block absolute top-1/2 left-[5%] right-[5%] h-1.5 -translate-y-1/2 bg-gradient-to-r from-[#93C5FD] via-[#6EE7B7] to-[#FCD34D] z-0 opacity-80"></div>

                    <div className="z-10 flex flex-col items-center justify-center bg-white rounded-full w-32 h-32 md:w-36 md:h-36 border-[5px] border-[#93C5FD] shadow-md transition-transform hover:scale-105 flex-shrink-0">
                        <div className="text-4xl md:text-5xl mb-2 leading-none">🌱</div>
                        <div className="text-center">
                            <div className="font-bold text-[#1E3A8A] text-sm md:text-base leading-tight">1. Mở đầu</div>
                            <div className="text-xs md:text-sm text-gray-500 font-normal leading-tight mt-0.5">(Gieo hạt)</div>
                        </div>
                    </div>

                    <div className="z-10 flex flex-col items-center justify-center bg-white rounded-full w-36 h-36 md:w-40 md:h-40 border-[5px] border-[#34D399] shadow-lg transition-transform hover:scale-105 flex-shrink-0">
                        <div className="text-5xl md:text-6xl mb-2 leading-none">🌿</div>
                        <div className="text-center">
                            <div className="font-bold text-[#065F46] text-sm md:text-base leading-tight">2. Tăng trưởng</div>
                            <div className="text-xs md:text-sm text-gray-500 font-normal leading-tight mt-0.5">(Lớn nhanh)</div>
                        </div>
                    </div>

                    <div className="z-10 flex flex-col items-center justify-center bg-white rounded-full w-40 h-40 md:w-48 md:h-48 border-[5px] border-[#10B981] shadow-xl transition-transform hover:scale-105 flex-shrink-0">
                        <div className="text-6xl md:text-7xl mb-2 leading-none">🍎</div>
                        <div className="text-center">
                            <div className="font-bold text-[#065F46] text-base md:text-lg leading-tight">3. Bão hòa</div>
                            <div className="text-xs md:text-sm text-gray-500 font-normal leading-tight mt-0.5">(Trĩu quả)</div>
                        </div>
                    </div>

                    <div className="z-10 flex flex-col items-center justify-center bg-white rounded-full w-32 h-32 md:w-36 md:h-36 border-[5px] border-[#F59E0B] shadow-md transition-transform hover:scale-105 flex-shrink-0">
                        <div className="text-4xl md:text-5xl mb-2 leading-none">🍂</div>
                        <div className="text-center">
                            <div className="font-bold text-[#92400E] text-sm md:text-base leading-tight">4. Suy thoái</div>
                            <div className="text-xs md:text-sm text-gray-500 font-normal leading-tight mt-0.5">(Rụng lá)</div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- MAIN PAGE ---
        const MarketingBook = () => {
            const [activeTerm, setActiveTerm] = useState(null);

            const handleContainerClick = () => {
                if (activeTerm) setActiveTerm(null);
            };

            return (
                <GlossaryContext.Provider value={{ setActiveTerm, activeTerm }}>
                    <div className="min-h-screen py-8 px-4 md:px-0 font-sans" onClick={handleContainerClick}>
                        <div className="max-w-5xl mx-auto bg-white shadow-[0_10px_40px_rgba(0,0,0,0.05)] rounded-2xl overflow-hidden border border-slate-100">
                            
                            {/* HERO BANNER - SOLID COLOR */}
                            <div className="bg-[#244186] py-16 flex flex-col justify-center items-center text-center px-6 border-b-4 border-blue-400">
                                <div className="mb-5 opacity-90">
                                    <i className="fa-solid fa-box-open text-[#BBD3FA] text-[4rem]"></i>
                                </div>
                                <h1 className="text-white font-serif text-[2.2rem] md:text-[3.2rem] font-bold mb-6 tracking-wide drop-shadow-md">
                                    Chương 6: Chiến Lược Sản Phẩm
                                </h1>
                                <div className="bg-transparent text-white px-6 py-2 rounded-full font-medium text-[0.95rem] md:text-lg border border-white/40">
                                    Chữ "P" đầu tiên và quan trọng nhất (Product)
                                </div>
                            </div>

                            {/* ULAW Banner / ROADMAP - SOLID COLOR */}
                            <div className="bg-[#0F766E] text-white p-6 font-sans flex items-start md:items-center gap-5">
                                <div className="shrink-0 text-[#FBBF24] mt-1 md:mt-0">
                                    <i className="fa-solid fa-map-location-dot text-[3rem]"></i>
                                </div>
                                <div>
                                    <p className="font-bold text-lg md:text-xl mb-2">Định vị hành trình học tập</p>
                                    <p className="text-[0.95rem] md:text-base text-teal-50 opacity-95 leading-relaxed font-sans">
                                        Chúng ta đã đi qua Bước 1 (Nghiên cứu) và Bước 2 ( <Term term="Chiến lược STP" variant="pill" /> ). Giờ là lúc bước vào Bước 3: LÀM ( <Term term="Marketing Mix 4P" variant="pill" /> ). Bản tổng hợp dưới đây cam kết không bỏ sót kiến thức cốt lõi nào.
                                    </p>
                                </div>
                            </div>

                            <div className="p-8 md:p-12 space-y-16">
                                
                                {/* I. KHÁI NIỆM VÀ 3 CẤP ĐỘ */}
                                <section>
                                    <h2 className="text-[1.8rem] font-bold text-[#1E3A8A] border-b-2 border-slate-200 pb-4 mb-8 flex items-center gap-3">
                                        <i className="fa-solid fa-cube text-[#3B82F6]"></i>
                                        1. Khái niệm và 3 cấp độ cấu thành sản phẩm
                                    </h2>
                                    <p className="mb-4 font-serif text-[1.05rem] text-slate-700 leading-relaxed">
                                        <strong>Khái niệm:</strong> Sản phẩm là tất cả những gì thỏa mãn nhu cầu/ước muốn và được đưa ra chào bán, bao gồm cả vật chất, phi vật chất (dịch vụ) hoặc kết hợp cả hai.
                                    </p>

                                    <ExamTip title="Trọng tâm: 3 cấp độ cấu thành sản phẩm">
                                        Đề thi hay yêu cầu bạn <span className="golden-keyword">phân loại một yếu tố thuộc cấp độ nào</span>. Hãy nhớ 3 cấp độ từ trong ra ngoài:
                                        <ul className="list-disc pl-5 mt-2 space-y-2 font-semibold text-[#991B1B]">
                                            <li><span className="text-[#1E3A8A]">Sản phẩm cốt lõi:</span> Lợi ích thực sự khách hàng mua (VD: mua xe đạp là mua "phương tiện đi lại").</li>
                                            <li><span className="text-[#1E3A8A]">Sản phẩm cụ thể:</span> Yếu tố nhận diện gồm đặc tính, kiểu dáng, chất lượng, bao bì, nhãn hiệu.</li>
                                            <li><span className="text-[#1E3A8A]">Sản phẩm gia tăng (Bổ sung):</span> Lắp đặt, giao hàng, bảo hành, dịch vụ hỗ trợ để tăng sức cạnh tranh.</li>
                                        </ul>
                                    </ExamTip>
                                </section>

                                {/* II. PHÂN LOẠI SẢN PHẨM */}
                                <section>
                                    <h2 className="text-[1.8rem] font-bold text-[#1E3A8A] border-b-2 border-slate-200 pb-4 mb-8 flex items-center gap-3">
                                        <i className="fa-solid fa-list-check text-[#3B82F6]"></i>
                                        2. Phân loại sản phẩm
                                    </h2>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {/* Hàng tiêu dùng */}
                                        <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm border-t-4 border-t-indigo-500">
                                            <h4 className="font-bold text-indigo-900 text-lg mb-4 pb-2 border-b border-indigo-100 flex items-center gap-2">
                                                <i className="fa-solid fa-cart-shopping"></i> Hàng tiêu dùng
                                            </h4>
                                            <p className="text-sm text-slate-500 mb-3 italic">Phân loại dựa theo thói quen mua:</p>
                                            <ul className="space-y-4 text-[0.95rem] text-slate-700 font-sans">
                                                <li><strong className="text-indigo-700">1. Hàng tiện dụng (thường ngày):</strong> Tiêu dùng thường xuyên, ít đắn đo suy nghĩ (kem đánh răng, xà phòng).</li>
                                                <li><strong className="text-indigo-700">2. Hàng mua sắm (lựa chọn):</strong> Tốn thời gian cân nhắc, so sánh giá cả, chất lượng, kiểu dáng (quần áo, nội thất).</li>
                                                <li><strong className="text-indigo-700">3. Hàng đặc biệt (đặc thù):</strong> Đắt tiền, mang tính độc đáo, rủi ro cao khi mua (ô tô, máy ảnh cơ).</li>
                                                <li><strong className="text-indigo-700">4. Hàng thụ động:</strong> Khách hàng không biết hoặc chưa nghĩ đến việc mua (bảo hiểm, dịch vụ mai táng).</li>
                                            </ul>
                                        </div>

                                        {/* Tư liệu sản xuất */}
                                        <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm border-t-4 border-t-orange-500">
                                            <h4 className="font-bold text-orange-900 text-lg mb-4 pb-2 border-b border-orange-100 flex items-center gap-2">
                                                <i className="fa-solid fa-industry"></i> Tư liệu sản xuất (TLSX)
                                            </h4>
                                            <p className="text-sm text-slate-500 mb-3 italic">Hàng hóa mua để phục vụ kinh doanh/sản xuất:</p>
                                            <ul className="space-y-4 text-[0.95rem] text-slate-700 font-sans">
                                                <li><strong className="text-orange-700">1. Vật tư và chi tiết:</strong> Đi thẳng và cấu thành trực tiếp vào sản phẩm cuối cùng (bông gòn, gỗ, ốc vít).</li>
                                                <li><strong className="text-orange-700">2. Tài sản cố định:</strong> Không trực tiếp tạo thành SP nhưng dịch chuyển dần giá trị vào SP (máy móc, nhà xưởng).</li>
                                                <li><strong className="text-orange-700">3. Vật tư phụ và dịch vụ:</strong> Chỉ hỗ trợ cho quá trình kinh doanh (dịch vụ vận chuyển, tư vấn pháp lý, điện nước).</li>
                                            </ul>
                                        </div>
                                    </div>
                                </section>

                                {/* III. NHÃN HIỆU VÀ BAO BÌ */}
                                <section>
                                    <h2 className="text-[1.8rem] font-bold text-[#1E3A8A] border-b-2 border-slate-200 pb-4 mb-8 flex items-center gap-3">
                                        <i className="fa-solid fa-copyright text-[#3B82F6]"></i>
                                        3. Quyết định về Nhãn hiệu và Bao bì
                                    </h2>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                                        <DeepDiveCard 
                                            icon="fa-solid fa-tags" 
                                            title="Nhãn hiệu (Brand)" 
                                            colorTheme="border-amber-500 text-amber-900"
                                            summary={
                                                <div>
                                                    Gồm <strong>Tên nhãn hiệu</strong> (đọc được) và <strong>Dấu hiệu nhãn hiệu</strong> (Logo, màu sắc, biểu tượng không đọc được).
                                                </div>
                                            }
                                            details={
                                                <ul className="list-disc pl-5 mt-2 space-y-2">
                                                    <li><strong>Chủ sở hữu:</strong> Có thể gắn nhãn hiệu của NSX, của nhà trung gian (VD: Co.op Select), hoặc kết hợp cả hai (Dior collab Nike).</li>
                                                    <li><strong>Tiêu chí đặt tên:</strong> Dễ đọc, dễ nhớ, độc đáo, gợi lợi ích và được pháp luật bảo hộ.</li>
                                                </ul>
                                            }
                                        />
                                        
                                        <DeepDiveCard 
                                            icon="fa-solid fa-box" 
                                            title="Bao bì (Packaging)" 
                                            colorTheme="border-emerald-500 text-emerald-900"
                                            summary="Gồm 3 lớp (Lớp đầu, lớp nhì, lớp vận chuyển). Ngoài chức năng chứa đựng, bảo vệ, bao bì còn là công cụ Marketing mạnh mẽ."
                                            details="Bao bì giúp thu hút sự chú ý tại điểm bán, cung cấp thông tin sản phẩm và kích thích khách hàng mua bốc đồng."
                                        />
                                    </div>

                                    <ExamTip title="Trọng tâm: Bẫy Bao Bì">
                                        Chú ý bẫy về chức năng của bao bì: Trong trắc nghiệm, bao bì thường được ví như <Term term="Người bán hàng im lặng" /> hay đóng vai trò quan trọng giúp <span className="golden-keyword">"giới thiệu sản phẩm"</span> và thúc đẩy hành vi mua.
                                    </ExamTip>
                                </section>

                                {/* IV. DANH MỤC VÀ DÒNG SẢN PHẨM */}
                                <section>
                                    <h2 className="text-[1.8rem] font-bold text-[#1E3A8A] border-b-2 border-slate-200 pb-4 mb-8 flex items-center gap-3">
                                        <i className="fa-solid fa-sitemap text-[#3B82F6]"></i>
                                        4. Danh mục và Dòng (Chủng loại) sản phẩm
                                    </h2>

                                    <ExamTip title="Trọng tâm: Bẫy Danh mục & Dòng SP">
                                        <span className="golden-keyword">Bẫy kinh điển!</span> Đề thi sẽ đảo lộn các khái niệm đo lường, bạn bắt buộc phải phân biệt rạch ròi:
                                        <ul className="list-disc pl-5 mt-2 space-y-1">
                                            <li><strong>"Bề rộng":</strong> Là số lượng <span className="underline">các dòng/chủng loại</span> sản phẩm mà công ty có.</li>
                                            <li><strong>"Bề sâu":</strong> Là số lượng <span className="underline">phiên bản cụ thể</span> trong một dòng đó.</li>
                                        </ul>
                                    </ExamTip>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                                        <div className="p-6 rounded-xl border border-blue-200 bg-[#EFF6FF] flex flex-col h-full shadow-sm hover:shadow-md transition-shadow">
                                            <h5 className="text-blue-800 font-bold text-xl mb-4 flex items-center gap-2 border-b border-blue-200 pb-2">
                                                <i className="fa-solid fa-boxes-stacked"></i> Danh mục (Product Mix)
                                            </h5>
                                            <p className="text-base text-slate-700 leading-relaxed mb-4">
                                                Tập hợp tất cả các chủng loại do một công ty bán ra.
                                            </p>
                                            <div className="mt-auto">
                                                <span className="text-sm font-bold text-red-600 block mb-2">Đo lường bằng 4 tiêu chí:</span>
                                                <ul className="list-disc pl-5 text-[0.95rem] text-slate-700 space-y-1">
                                                    <li><strong>Bề rộng</strong></li>
                                                    <li><strong>Bề sâu</strong></li>
                                                    <li><strong>Mức độ phong phú</strong> (Tổng số mặt hàng)</li>
                                                    <li><strong>Mức độ hài hòa</strong> (Sự liên quan giữa các dòng)</li>
                                                </ul>
                                            </div>
                                        </div>

                                        <div className="p-6 rounded-xl border border-orange-200 bg-[#FFF7ED] flex flex-col h-full shadow-sm hover:shadow-md transition-shadow">
                                            <h5 className="text-orange-800 font-bold text-xl mb-4 flex items-center gap-2 border-b border-orange-200 pb-2">
                                                <i className="fa-solid fa-list-ul"></i> Dòng/Chủng loại (Product Line)
                                            </h5>
                                            <p className="text-base text-slate-700 leading-relaxed mb-4">
                                                Nhóm sản phẩm liên hệ mật thiết với nhau. Doanh nghiệp có thể áp dụng:
                                            </p>
                                            <div className="mt-auto">
                                                <ul className="list-disc pl-5 text-[0.95rem] text-slate-700 space-y-2">
                                                    <li><strong>Phát triển dòng:</strong> Kéo dài lên trên (cao cấp) hoặc xuống dưới (bình dân).</li>
                                                    <li><strong>Bổ sung mặt hàng (Line filling):</strong> Thêm SP lấp chỗ trống để tăng lợi nhuận, tận dụng năng lực sản xuất.</li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                {/* V. CÁC CHIẾN LƯỢC SẢN PHẨM CỤ THỂ */}
                                <section>
                                    <h2 className="text-[1.8rem] font-bold text-[#1E3A8A] border-b-2 border-slate-200 pb-4 mb-8 flex items-center gap-3">
                                        <i className="fa-solid fa-chess-knight text-[#3B82F6]"></i>
                                        5. Các chiến lược cho từng sản phẩm cụ thể
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <ScaleCard 
                                            title="Chiến lược Đổi mới" 
                                            summary="Chủ động hoặc phản ứng tạo ra sản phẩm hoàn toàn mới trên thị trường." 
                                            icon="fa-solid fa-lightbulb" borderColor="bg-blue-500" bgColor="bg-blue-100" iconColor="text-blue-600"
                                        />
                                        <ScaleCard 
                                            title="Chiến lược Bắt chước" 
                                            summary="Sợ rủi ro nên hoàn thiện, tối ưu hóa tính năng sản phẩm đã có của đối thủ." 
                                            icon="fa-solid fa-copy" borderColor="bg-slate-500" bgColor="bg-slate-100" iconColor="text-slate-600"
                                        />
                                        <ScaleCard 
                                            title="Chiến lược Thích ứng" 
                                            summary="Thay đổi sản phẩm cho phù hợp nhu cầu, đồng thời hạ giá bán để tăng cạnh tranh." 
                                            icon="fa-solid fa-sliders" borderColor="bg-green-500" bgColor="bg-green-100" iconColor="text-green-600"
                                        />
                                        <ScaleCard 
                                            title="Chiến lược Tái định vị" 
                                            summary="Làm mới hình ảnh trên nền tảng có sẵn để xóa bỏ hình ảnh già nua, tiêu cực." 
                                            example="Cú lội ngược dòng ngoạn mục của Biti's Hunter."
                                            icon="fa-solid fa-rotate-right" borderColor="bg-purple-500" bgColor="bg-purple-100" iconColor="text-purple-600"
                                        />
                                    </div>
                                </section>

                                {/* VI. CHU KỲ SỐNG */}
                                <section>
                                    <h2 className="text-[1.8rem] font-bold text-[#1E3A8A] border-b-2 border-slate-200 pb-4 mb-8 flex items-center gap-3">
                                        <i className="fa-solid fa-chart-line text-[#3B82F6]"></i>
                                        6. Chu kỳ sống của sản phẩm (PLC)
                                    </h2>
                                    
                                    <PLCTreeVisualization />

                                    <ExamTip title="Trọng tâm: Mục tiêu PLC">
                                        Đề thi rất hay hỏi Mục tiêu Marketing hoặc Chiến lược ở các giai đoạn cụ thể:
                                        <ul className="list-disc pl-5 mt-2 space-y-1">
                                            <li>Giai đoạn <strong>"Tăng trưởng"</strong>: Khách hàng chấp nhận, cạnh tranh tăng. Mục tiêu là <span className="golden-keyword">tối đa hóa thị phần</span>.</li>
                                            <li>Giai đoạn <strong>"Bão hòa"</strong>: Khối lượng tiêu thụ đạt đỉnh, cạnh tranh khốc liệt nhất. Mục tiêu là <span className="golden-keyword">tối đa hóa lợi nhuận và bảo vệ thị phần</span>.</li>
                                            <li>Giai đoạn <strong>"Suy thoái"</strong>: Doanh số giảm mạnh do thị hiếu đổi hoặc công nghệ mới. Mục tiêu là <span className="golden-keyword">cắt giảm chi phí, thu hẹp, hoặc khai tử</span> sản phẩm.</li>
                                        </ul>
                                    </ExamTip>

                                    <div className="flex flex-col gap-4 mt-8">
                                        <ScaleCard 
                                            title="1. Mở đầu (Giới thiệu)"
                                            summary="Doanh thu thấp, lỗ, chi phí quảng cáo cao."
                                            example="Mục tiêu: Tăng cường quảng cáo để khách hàng nhận thức và dùng thử."
                                            icon="fa-solid fa-seedling" borderColor="bg-[#93C5FD]" bgColor="bg-[#EFF6FF]" iconColor="text-[#3B82F6]"
                                        />
                                        <ScaleCard 
                                            title="2. Tăng trưởng"
                                            summary="Doanh số/lợi nhuận tăng nhanh, cạnh tranh nhảy vào."
                                            example="Mục tiêu: Tối đa hóa thị phần."
                                            icon="fa-solid fa-leaf" borderColor="bg-[#6EE7B7]" bgColor="bg-[#F0FDF4]" iconColor="text-[#10B981]"
                                        />
                                        <ScaleCard 
                                            title="3. Bão hòa (Trưởng thành)"
                                            summary="Khối lượng tiêu thụ đạt đỉnh, cạnh tranh khốc liệt nhất (đạp giá, khuyến mãi)."
                                            example="Mục tiêu: Tối đa hóa lợi nhuận và bảo vệ thị phần."
                                            icon="fa-solid fa-apple-whole" borderColor="bg-[#10B981]" bgColor="bg-[#D1FAE5]" iconColor="text-[#059669]"
                                        />
                                        <ScaleCard 
                                            title="4. Suy thoái"
                                            summary="Doanh số/lợi nhuận giảm mạnh (VD: Blockbuster sụp đổ do Netflix)."
                                            example="Mục tiêu: Cắt giảm chi phí, thu hẹp, hoặc khai tử sản phẩm."
                                            icon="fa-solid fa-leaf-dead" borderColor="bg-[#FCD34D]" bgColor="bg-[#FFFBEB]" iconColor="text-[#D97706]"
                                        />
                                    </div>
                                </section>

                                {/* VII. MARKETING DỊCH VỤ 7P */}
                                <section>
                                    <h2 className="text-[1.8rem] font-bold text-[#1E3A8A] border-b-2 border-slate-200 pb-4 mb-8 flex items-center gap-3">
                                        <i className="fa-solid fa-concierge-bell text-[#3B82F6]"></i>
                                        7. Marketing Dịch vụ (Mở rộng 7P)
                                    </h2>

                                    <ExamTip title="Trọng tâm: Dịch vụ & Tính vô hình">
                                        Phần này được mở rộng trong đề thi. Bạn cần nhớ:
                                        <ul className="list-disc pl-5 mt-2 space-y-2">
                                            <li>Nhớ rõ tính <strong>"vô hình"</strong> của dịch vụ: <span className="golden-keyword">Không thể lưu kho, không thể cấp bản quyền, không thể trưng bày hay cầm nắm</span> trước khi mua. Việc mua dịch vụ chính là mua "sự thực hiện" hoặc "sự cảm nhận".</li>
                                            <li>Mô hình 4P truyền thống được mở rộng thành 7P: Thêm <span className="golden-keyword">People (Con người)</span>, <span className="golden-keyword">Process (Quy trình)</span>, và <span className="golden-keyword">Physical evidence (Bằng chứng vật chất)</span>.</li>
                                        </ul>
                                    </ExamTip>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
                                        <div className="bg-white p-5 rounded-xl border border-teal-200 shadow-sm text-center hover:-translate-y-1 transition-transform">
                                            <div className="w-14 h-14 mx-auto bg-teal-50 text-teal-600 rounded-full flex items-center justify-center mb-4 text-2xl">
                                                <i className="fa-solid fa-users"></i>
                                            </div>
                                            <h5 className="font-bold text-slate-900 mb-2">People (Con người)</h5>
                                            <p className="text-[0.9rem] text-slate-600">Nhân viên là người trực tiếp tạo ra dịch vụ. Thái độ của họ định đoạt sự hài lòng.</p>
                                        </div>
                                        <div className="bg-white p-5 rounded-xl border border-teal-200 shadow-sm text-center hover:-translate-y-1 transition-transform">
                                            <div className="w-14 h-14 mx-auto bg-teal-50 text-teal-600 rounded-full flex items-center justify-center mb-4 text-2xl">
                                                <i className="fa-solid fa-gears"></i>
                                            </div>
                                            <h5 className="font-bold text-slate-900 mb-2">Process (Quy trình)</h5>
                                            <p className="text-[0.9rem] text-slate-600">Cách thức dịch vụ được cung cấp. Càng nhanh gọn, ít thủ tục càng tốt.</p>
                                        </div>
                                        <div className="bg-white p-5 rounded-xl border border-teal-200 shadow-sm text-center hover:-translate-y-1 transition-transform">
                                            <div className="w-14 h-14 mx-auto bg-teal-50 text-teal-600 rounded-full flex items-center justify-center mb-4 text-2xl">
                                                <i className="fa-solid fa-shop"></i>
                                            </div>
                                            <h5 className="font-bold text-slate-900 mb-2">Physical Evidence</h5>
                                            <p className="text-[0.9rem] text-slate-600">Bằng chứng vật chất. Môi trường nơi dịch vụ diễn ra để bù đắp tính vô hình.</p>
                                        </div>
                                    </div>
                                </section>

                            </div>

                            <footer className="bg-[#F8FAFC] p-8 text-center text-slate-500 text-sm font-sans border-t border-slate-200">
                                © Chương 6: Chiến lược Sản phẩm - Cập nhật đầy đủ 7 chuyên đề trọng tâm theo yêu cầu.
                            </footer>
                        </div>

                        {/* Global Tooltip/Modal Context */}
                        {activeTerm && (
                            <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center p-4">
                                <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setActiveTerm(null)}></div>
                                <div className="relative w-full max-w-sm bg-white rounded-xl shadow-2xl overflow-hidden animate-in slide-in-from-bottom-5">
                                    <div className="bg-[#1E3A8A] p-4 flex justify-between items-center text-white">
                                        <div className="flex items-center gap-2 font-sans font-bold text-[1rem]">
                                            <i className="fa-solid fa-book-open"></i> Sổ tay thuật ngữ
                                        </div>
                                        <button onClick={() => setActiveTerm(null)} className="p-1 hover:bg-white/20 rounded-full transition-colors">
                                            <i className="fa-solid fa-xmark text-xl"></i>
                                        </button>
                                    </div>
                                    <div className="p-6">
                                        <h3 className="text-xl font-bold font-sans text-slate-900 mb-3">{activeTerm}</h3>
                                        <p className="text-slate-700 text-[0.95rem] leading-relaxed font-serif">{dictionaryData[activeTerm]}</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </GlossaryContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MarketingBook />);
    </script>
</body>
</html>
